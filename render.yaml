# ─────────────────────────────────────────────────────────────
# render.yaml — Configuration de déploiement sur Render
# ─────────────────────────────────────────────────────────────

services:
  - type: web
    name: payment-api
    runtime: java
    runtimeVersion: "17"
    
    # Répertoire de build
    buildDir: .
    
    # Commande de build
    buildCommand: "mvn clean package -DskipTests"
    
    # Commande de démarrage
    startCommand: "java -jar target/payment-api-1.0.0.jar"
    
    # Variables d'environnement
    envVars:
      - key: PORT
        value: "8080"
      - key: DB_DRIVER
        value: org.postgresql.Driver
    
    # Nombre d'instances
    numInstances: 1
    
    # Région
    region: oregon

# ─────────────────────────────────────────────────────────────
# INSTRUCTIONS :
# 1. DATABASE_URL doit être ajoutée MANUELLEMENT dans le dashboard
# 2. Ne pas commiter les secrets dans ce fichier
# 3. Render va automatiquement :
#    - Cloner le repo
#    - Compiler avec Maven
#    - Démarrer l'application
# ─────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────
# ICT304 Payment API — Configuration principale
# ─────────────────────────────────────────────────────────────

spring.application.name=payment-api

# Base de données H2 en mémoire (développement local)
# En production Railway/Render : la variable DATABASE_URL remplace tout
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Console H2 (seulement en local — désactiver en prod)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.info.title=ICT304 Payment API
springdoc.info.description=API REST de paiement - Projet ICT304 Tests Logiciels
springdoc.info.version=1.0.0

# Actuator (health check pour Railway/Render)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Port
server.port=${PORT:8080}
